<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ODH Code Viewer — Ohio Administrative Code</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
    <div class="header-left">
      <h1 class="header-title">ODH Code Viewer</h1>
      <select class="rule-selector" id="ruleSelector" aria-label="Select rule"></select>
    </div>
    <div class="header-right">
      <a class="header-link" id="sourceLink" href="#" target="_blank" rel="noopener">Source</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <div class="search-bar" id="searchBar">
    <div class="search-wrapper">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search rules... (e.g. lifeguard, chlorine, SVRS)" autocomplete="off">
      <button class="search-clear" id="searchClear" aria-label="Clear search">&times;</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="breadcrumb-bar" id="breadcrumbBar">
    <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
  </div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <nav class="toc" id="toc" aria-label="Table of contents"></nav>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <main class="content" id="content">
      <div class="rule-header" id="ruleHeader"></div>
      <div class="rule-body" id="ruleBody"></div>
    </main>
  </div>

  <button class="scroll-top" id="scrollTop" aria-label="Scroll to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="js/rules/index.js"></script>
  <script src="js/rules/3701-31-04.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
